<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>SetTimeout and SetInterval</h1>
    <h2>welcome </h2>
    <button id="stop">Stop</button>
    <button id="stop">Stopp</button>
</body>
<script>

//setTimeout is used to execute a function after a specified time interval
    const change = setTimeout(() => {
        document.querySelector('h1').innerText = "Hello World! SetTimeout"
    },2000) 

    document.querySelector('#stop').addEventListener('click', () => {
        clearTimeout(change)   //used to stop the setTimeout function
    }) 

//SetInterval is used to execute a function repeatedly at specified time intervals
    const change2 = setInterval(() => {
        document.querySelector('h2').innerText = new Date().toLocaleTimeString()  
    },1000)

    document.querySelector('#stopp').addEventListener('click', () => {
        clearInterval(change2)   //used to stop the setInterval function
    })

</script>
</html>
